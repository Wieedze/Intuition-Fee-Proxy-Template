<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon-light.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon-dark.svg" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intuition.box Proxy Factory</title>
    <meta name="description" content="Deploy a versioned fee proxy for the Intuition MultiVault." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          var root = document.documentElement
          if (t === 'light') root.classList.remove('dark')
          else root.classList.add('dark')
        } catch (_) {}
      })()
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
